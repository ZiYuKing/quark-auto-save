<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2f7cff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="QuarkAutoSave">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/static/favicon.ico">
    <title>鐧诲綍</title>
    <link rel="stylesheet" href="./static/css/bootstrap.min.css">
    <link rel="stylesheet" href="./static/css/bootstrap-icons.min.css">
    <script src="/static/js/pwa-register.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #c4d7ff 0%, #7996ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .login-header {
            background: rgba(255, 255, 255, 0.9);
            padding: 1rem 2rem;
            text-align: center;
        }

        .login-body {
            background: #fff;
            padding: 2rem;
        }

        .btn {
            border-radius: 20px;
            padding: 10px 20px;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="mb-3">鐧诲綍</h1>
                <p class="text-muted">娆㈣繋鍥炴潵锛岃鐧诲綍鎮ㄧ殑璐︽埛</p>
            </div>
            <div class="login-body">
                {% if message %}
                <div class="alert alert-danger text-center" role="alert">
                    [[ message ]]
                </div>
                {% endif %}
                <form action="/login" method="POST">
                    <div class="form-group mb-3">
                        <label for="username" class="form-label">鐢ㄦ埛鍚?/label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                            </div>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                    </div>
                    <div class="form-group mb-4">
                        <label for="password" class="form-label">瀵嗙爜</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            </div>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">鐧诲綍</button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
